<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B2D3F"/>
      <stop offset="100%" style="stop-color:#162436"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#243A50"/>
      <stop offset="100%" style="stop-color:#1E3347"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#387ed1"/>
      <stop offset="100%" style="stop-color:#2ECC8C"/>
    </linearGradient>
    <linearGradient id="chart-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#387ed1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#387ed1;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="chart-clip">
      <rect x="680" y="120" width="460" height="280" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#2E4D66" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Main card -->
  <rect x="60" y="60" width="1080" height="510" rx="16" fill="url(#card)" stroke="#2E4D66" stroke-width="1.5"/>

  <!-- Top accent bar -->
  <rect x="60" y="60" width="1080" height="4" rx="2" fill="url(#accent-line)"/>

  <!-- Left content area -->
  <!-- Small badge -->
  <rect x="100" y="120" width="200" height="32" rx="6" fill="rgba(56,126,209,0.15)" stroke="#387ed1" stroke-width="1"/>
  <text x="200" y="141" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#387ed1" text-anchor="middle" letter-spacing="1.5">NSE INDIA · LIVE DATA</text>

  <!-- Main title -->
  <text x="100" y="220" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#E8EDF2" letter-spacing="-1">Stock Analysis</text>
  <text x="100" y="280" font-family="Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="-1">
    <tspan fill="#387ed1">Pro</tspan>
  </text>

  <!-- Divider line -->
  <rect x="100" y="305" width="80" height="3" rx="1.5" fill="url(#accent-line)"/>

  <!-- Description -->
  <text x="100" y="345" font-family="Arial, sans-serif" font-size="19" fill="#90A4BE" letter-spacing="0.2">Advanced NSE Stock Analysis Platform</text>
  <text x="100" y="372" font-family="Arial, sans-serif" font-size="19" fill="#90A4BE" letter-spacing="0.2">with Technical Indicators &amp; AI Insights</text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="100" y="415" width="160" height="36" rx="18" fill="rgba(56,126,209,0.12)" stroke="rgba(56,126,209,0.35)" stroke-width="1"/>
  <circle cx="122" cy="433" r="6" fill="#387ed1"/>
  <text x="136" y="438" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#90A4BE">2000+ Stocks</text>

  <!-- Pill 2 -->
  <rect x="276" y="415" width="160" height="36" rx="18" fill="rgba(46,204,140,0.10)" stroke="rgba(46,204,140,0.3)" stroke-width="1"/>
  <circle cx="298" cy="433" r="6" fill="#2ECC8C"/>
  <text x="312" y="438" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#90A4BE">Nifty 50 Trends</text>

  <!-- Pill 3 -->
  <rect x="452" y="415" width="155" height="36" rx="18" fill="rgba(94,106,210,0.12)" stroke="rgba(94,106,210,0.35)" stroke-width="1"/>
  <circle cx="474" cy="433" r="6" fill="#5e6ad2"/>
  <text x="488" y="438" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#90A4BE">Dividend Optimizer</text>

  <!-- Feature pills row 2 -->
  <rect x="100" y="462" width="170" height="36" rx="18" fill="rgba(245,158,11,0.10)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <circle cx="122" cy="480" r="6" fill="#F59E0B"/>
  <text x="136" y="485" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#90A4BE">HSIC Dependency</text>

  <rect x="286" y="462" width="150" height="36" rx="18" fill="rgba(56,126,209,0.12)" stroke="rgba(56,126,209,0.35)" stroke-width="1"/>
  <circle cx="308" cy="480" r="6" fill="#387ed1"/>
  <text x="322" y="485" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#90A4BE">Real-time Data</text>

  <!-- Right side: decorative stock chart -->
  <g clip-path="url(#chart-clip)">
    <!-- Chart background card -->
    <rect x="668" y="108" width="484" height="304" rx="10" fill="rgba(27,45,63,0.8)" stroke="#2E4D66" stroke-width="1"/>

    <!-- Chart grid lines -->
    <line x1="680" y1="180" x2="1140" y2="180" stroke="#2E4D66" stroke-width="0.8"/>
    <line x1="680" y1="220" x2="1140" y2="220" stroke="#2E4D66" stroke-width="0.8"/>
    <line x1="680" y1="260" x2="1140" y2="260" stroke="#2E4D66" stroke-width="0.8"/>
    <line x1="680" y1="300" x2="1140" y2="300" stroke="#2E4D66" stroke-width="0.8"/>
    <line x1="680" y1="340" x2="1140" y2="340" stroke="#2E4D66" stroke-width="0.8"/>
    <line x1="680" y1="380" x2="1140" y2="380" stroke="#2E4D66" stroke-width="0.8"/>

    <!-- Area fill under chart line -->
    <polygon
      points="700,360 740,310 780,330 820,280 860,240 900,260 940,200 980,170 1020,185 1060,155 1100,130 1120,120 1120,400 700,400"
      fill="url(#chart-fill)"/>

    <!-- Main stock line (uptrend) -->
    <polyline
      points="700,360 740,310 780,330 820,280 860,240 900,260 940,200 980,170 1020,185 1060,155 1100,130 1120,120"
      fill="none" stroke="#387ed1" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Secondary line (Nifty) -->
    <polyline
      points="700,375 740,355 780,365 820,340 860,320 900,330 940,295 980,275 1020,285 1060,265 1100,250 1120,240"
      fill="none" stroke="#2ECC8C" stroke-width="2" stroke-dasharray="6,3" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Data points on main line -->
    <circle cx="980" cy="170" r="5" fill="#387ed1" stroke="#1B2D3F" stroke-width="2"/>
    <circle cx="1100" cy="130" r="5" fill="#387ed1" stroke="#1B2D3F" stroke-width="2"/>
    <circle cx="1120" cy="120" r="5" fill="#2ECC8C" stroke="#1B2D3F" stroke-width="2"/>

    <!-- Buy signal indicator -->
    <polygon points="820,295 814,285 826,285" fill="#2ECC8C"/>
    <text x="834" y="288" font-family="Arial, sans-serif" font-size="10" fill="#2ECC8C" font-weight="700">BUY</text>

    <!-- Chart label -->
    <rect x="688" y="118" width="100" height="22" rx="4" fill="rgba(56,126,209,0.15)"/>
    <text x="738" y="133" font-family="Arial, sans-serif" font-size="11" fill="#387ed1" text-anchor="middle" font-weight="600">RELIANCE.NS</text>

    <!-- Price label top-right -->
    <text x="1130" y="118" font-family="Arial, sans-serif" font-size="14" fill="#2ECC8C" font-weight="700" text-anchor="end">+12.4%</text>
  </g>

  <!-- Chart legend -->
  <rect x="680" y="400" width="460" height="60" rx="8" fill="rgba(36,58,80,0.6)" stroke="#2E4D66" stroke-width="1"/>
  <line x1="705" y1="425" x2="730" y2="425" stroke="#387ed1" stroke-width="2.5"/>
  <circle cx="717" cy="425" r="3" fill="#387ed1"/>
  <text x="738" y="430" font-family="Arial, sans-serif" font-size="12" fill="#90A4BE">Stock Price</text>
  <line x1="815" y1="425" x2="840" y2="425" stroke="#2ECC8C" stroke-width="2" stroke-dasharray="5,2"/>
  <circle cx="827" cy="425" r="3" fill="#2ECC8C"/>
  <text x="848" y="430" font-family="Arial, sans-serif" font-size="12" fill="#90A4BE">Nifty 50</text>
  <!-- Signal badges -->
  <rect x="960" y="413" width="56" height="24" rx="4" fill="rgba(46,204,140,0.2)"/>
  <text x="988" y="430" font-family="Arial, sans-serif" font-size="11" fill="#2ECC8C" text-anchor="middle" font-weight="700">BUY</text>
  <rect x="1026" y="413" width="60" height="24" rx="4" fill="rgba(245,158,11,0.2)"/>
  <text x="1056" y="430" font-family="Arial, sans-serif" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="700">HOLD</text>
  <rect x="1096" y="413" width="52" height="24" rx="4" fill="rgba(239,68,68,0.2)"/>
  <text x="1122" y="430" font-family="Arial, sans-serif" font-size="11" fill="#EF4444" text-anchor="middle" font-weight="700">SELL</text>

  <!-- Stats row at bottom -->
  <rect x="100" y="510" width="1000" height="1" fill="#2E4D66"/>

  <!-- Stat 1 -->
  <text x="180" y="548" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#387ed1" text-anchor="middle">2000+</text>
  <text x="180" y="568" font-family="Arial, sans-serif" font-size="12" fill="#607B96" text-anchor="middle">NSE Stocks</text>

  <!-- Divider -->
  <rect x="280" y="530" width="1" height="40" fill="#2E4D66"/>

  <!-- Stat 2 -->
  <text x="380" y="548" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#2ECC8C" text-anchor="middle">Real-Time</text>
  <text x="380" y="568" font-family="Arial, sans-serif" font-size="12" fill="#607B96" text-anchor="middle">Market Data</text>

  <!-- Divider -->
  <rect x="490" y="530" width="1" height="40" fill="#2E4D66"/>

  <!-- Stat 3 -->
  <text x="600" y="548" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#5e6ad2" text-anchor="middle">AI-Powered</text>
  <text x="600" y="568" font-family="Arial, sans-serif" font-size="12" fill="#607B96" text-anchor="middle">Signals &amp; Analysis</text>

  <!-- Divider -->
  <rect x="720" y="530" width="1" height="40" fill="#2E4D66"/>

  <!-- Stat 4 -->
  <text x="840" y="548" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#F59E0B" text-anchor="middle">Free</text>
  <text x="840" y="568" font-family="Arial, sans-serif" font-size="12" fill="#607B96" text-anchor="middle">No Login Required</text>

  <!-- Divider -->
  <rect x="950" y="530" width="1" height="40" fill="#2E4D66"/>

  <!-- Stat 5 -->
  <text x="1060" y="548" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#E8EDF2" text-anchor="middle">Nifty 50</text>
  <text x="1060" y="568" font-family="Arial, sans-serif" font-size="12" fill="#607B96" text-anchor="middle">Correlation</text>
</svg>
